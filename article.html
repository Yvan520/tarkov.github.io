/* ── 工具 ── */
const BASE = (() => { const p = location.pathname.split('/'); p.pop(); return p.join('/'); })();
const cache = {};
async function loadJSON(f) {
  if(cache[f]) return cache[f];
  try {
    const r = await fetch(BASE+'/data/'+f+'.json?t='+Date.now());
    if(!r.ok) throw new Error(r.status);
    return cache[f] = await r.json();
  } catch(e) { return null; }
}
function getLS(k) {
  try { const d=localStorage.getItem('tarkov_'+k); return d?JSON.parse(d):null; } catch{return null;}
}

/* ── Markdown 解析器（轻量版）── */
function md2html(md) {
  if (!md) return '<p>暂无内容</p>';
  let h = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // 标题
    .replace(/^#### (.+)$/gm,'<h4>$1</h4>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    // 分割线
    .replace(/^---+$/gm,'<hr>')
    // 引用
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    // 代码块
    .replace(/```[\w]*\n([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    // 行内代码
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    // 粗体
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    // 斜体（当em标签用）
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    // 链接
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    // 无序列表
    .replace(/^\- (.+)$/gm,'<li>$1</li>')
    // 有序列表
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    // 换行变段落
    .split('\n\n').map(block => {
      block = block.trim();
      if (!block) return '';
      if (block.match(/^<(h[1-6]|hr|pre|blockquote|ul|ol|li)/)) return block;
      if (block.includes('<li>')) return '<ul>'+block+'</ul>';
      return '<p>'+block.replace(/\n/g,'<br>')+'</p>';
    }).join('\n');
  return h;
}

/* ── 主逻辑 ── */
async function loadArticle() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if (!id) {
    showError('未指定文章', '请从文章列表进入', 'articles.html');
    return;
  }

  // 获取所有文章
  let articles = getLS('articles');
  if (!articles || !articles.length) {
    const j = await loadJSON('articles');
    articles = j?.articles || j || [];
  }
  if (!articles.length) articles = DEF_ARTICLES;

  // 查找文章
  const art = articles.find(a => a.id === id || encodeURIComponent(a.title) === id || a.title === decodeURIComponent(id));

  if (!art) {
    // 找不到就用默认数据里找
    const defArt = DEF_ARTICLES.find(a => a.id === id);
    if (defArt) { renderArticle(defArt, articles); return; }
    showError('文章不存在', '该文章可能已被删除或链接有误', 'articles.html');
    return;
  }

  renderArticle(art, articles);
}

function renderArticle(art, allArticles) {
  // 更新页面标题和meta
  document.title = art.title + ' | 塔科夫攻略站';

  // 面包屑
  document.getElementById('breadCat').textContent = art.categoryName || art.categoryLabel || '攻略';

  // 相关文章
  const related = allArticles
    .filter(a => (a.id||a.title) !== (art.id||art.title) && a.category === art.category)
    .slice(0, 4);

  const tags = art.tags || [];
  const cs = catStyle[art.category] || 'cat-guide';

  document.getElementById('mainContent').innerHTML = `
    <div class="art-header">
      <div class="art-category ${cs}">${art.categoryName||art.categoryLabel||''}</div>
      <h1 class="art-h1">${art.title}</h1>
      <div class="art-meta">
        <span class="meta-item">👁 ${(art.views||0).toLocaleString()} 次阅读</span>
        <span class="meta-item">🕐 ${art.date||art.timeAgo||'最近'}</span>
        <span class="meta-item">✍️ 塔科夫攻略站</span>
        ${art.hot||art.badge==='hot'?'<span class="badge-hot">🔥 HOT</span>':''}
        ${art.isNew||art.badge==='new'?'<span class="badge-new">✨ NEW</span>':''}
      </div>
    </div>

    <div class="art-content">${md2html(art.content||art.summary||'文章内容暂未录入，请关注后续更新。')}</div>

    ${tags.length ? `<div class="art-tags">${tags.map(t=>`<span class="art-tag"># ${t}</span>`).join('')}</div>` : ''}

    ${related.length ? `
    <div class="related">
      <div class="related-title">📌 相关文章</div>
      <div class="related-grid">
        ${related.map(r=>`
        <a href="article.html?id=${r.id||encodeURIComponent(r.title)}" class="related-card">
          <div class="rc-cat ${catStyle[r.category]||'cat-guide'}">${r.categoryName||r.categoryLabel||''}</div>
          <div class="rc-title">${r.icon||''} ${r.title}</div>
          <div class="rc-meta">👁 ${(r.views||0).toLocaleString()} · ${r.date||r.timeAgo||''}</div>
        </a>`).join('')}
      </div>
    </div>` : ''}

    <a href="articles.html" class="back-btn">← 返回攻略列表</a>
  `;
}

function showError(title, desc, backUrl) {
  document.getElementById('breadCat').textContent = '错误';
  document.getElementById('mainContent').innerHTML = `
    <div class="state-box">
      <div class="state-icon">😕</div>
      <div class="state-title">${title}</div>
      <div class="state-desc">${desc}</div>
      <a href="${backUrl}" class="back-btn">← 返回攻略列表</a>
    </div>`;
}

loadArticle();
</script>
</body>
</html>
