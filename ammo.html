*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg1);color:var(--text1);font-family:var(--font);line-height:1.6}

a{text-decoration:none;color:inherit;transition:all .2s}
button{font-family:var(--font);cursor:pointer}
.nav{position:sticky;top:0;z-index:1000;height:60px;background:rgba(10,12,15,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;gap:16px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#07090b}
.logo-name{font-size:17px;font-weight:800;letter-spacing:2px;color:var(--text1)}.logo-name span{color:var(--gold)}
.ver{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 6px;border-radius:3px;font-family:var(--mono);margin-left:-4px}
.nav-links{display:flex;gap:2px;list-style:none;flex:1;justify-content:center}
.nav-links a{padding:7px 12px;border-radius:var(--r);font-size:13px;color:var(--text2);white-space:nowrap;text-decoration:none}
.nav-links a:hover{color:var(--text1);background:var(--bg3)}
.nav-links a.active{color:var(--gold);background:rgba(200,169,110,.07)}
.nav-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.nav-search-btn{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:var(--r);font-size:12px;transition:all .2s;white-space:nowrap}
.nav-search-btn:hover{border-color:var(--gold);color:var(--gold)}
.nav-burger{display:none;flex-direction:column;gap:5px;background:transparent;border:none;padding:4px}
.nav-burger span{display:block;width:22px;height:2px;background:var(--text2);border-radius:2px}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(10,12,15,.98);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:999;padding:12px 0}
.mobile-menu.open{display:block}
.mobile-menu a{display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:14px;color:var(--text2);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.03)}

/* 搜索弹窗 */
.search-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:80px 20px 20px;opacity:0;visibility:hidden;transition:all .25s}
.search-ov.on{opacity:1;visibility:visible}
.search-box{width:100%;max-width:640px}
.sm-wrap{position:relative;margin-bottom:14px}

.sm-input{width:100%;background:var(--bg3);border:2px solid var(--gold);border-radius:var(--r2);padding:16px 52px;font-size:16px;color:var(--text1);outline:none;font-family:var(--font);box-shadow:0 0 32px rgba(200,169,110,.15)}

.rec-title::before{content:'';width:4px;height:20px;background:linear-gradient(180deg,var(--gold),transparent);border-radius:2px}
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* 表格 */
.table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;overflow-x:auto}
table{width:100%;min-width:720px;border-collapse:collapse;font-size:13px}
thead{background:var(--bg2);border-bottom:1px solid var(--border)}
th{padding:12px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;transition:color .2s}
th:hover{color:var(--gold)}
th.sort-desc::after{content:' ↓';color:var(--gold)}
th.sort-asc::after{content:' ↑';color:var(--gold)}
th.sortable::after{content:' ↕';opacity:.3}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
tbody tr:hover{background:rgba(200,169,110,.03)}
tbody tr:last-child{border-bottom:none}
td{padding:11px 14px;color:var(--text2);white-space:nowrap}
.td-name{font-weight:600;color:var(--text1)!important;display:flex;align-items:center;gap:7px}
.cal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.v-hi{color:var(--green2)!important;font-weight:700}
.v-md{color:var(--orange2)!important;font-weight:700}
.v-lo{color:var(--red2)!important;font-weight:700}
.pen-wrap{display:flex;align-items:center;gap:7px}
.pen-track{width:72px;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;flex-shrink:0}
.pen-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green2),var(--gold))}
.armc-wrap{display:flex;gap:2px}
.armc{width:17px;height:17px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800}
.armc-y{background:rgba(74,140,92,.25);color:var(--green2);border:1px solid rgba(74,140,92,.3)}
.armc-n{background:rgba(192,80,80,.10);color:var(--red2);border:1px solid rgba(192,80,80,.15)}
.armc-m{background:rgba(192,112,48,.20);color:var(--orange2);border:1px solid rgba(192,112,48,.25)}
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:24px 32px;margin-top:60px}
.footer-inner{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;font-size:12px;color:var(--text3);flex-wrap:wrap;gap:8px}
.footer-inner a:hover{color:var(--gold)}
@media(max-width:900px){.nav-links{display:none}.nav-burger{display:flex}.rec-grid{grid-template-columns:repeat(2,1fr)}.wrap{padding:32px 16px}.page-hero{padding:32px 16px}.nav-search-btn span{display:none}}
@media(max-width:480px){.page-h1{font-size:20px}.page-sub{font-size:14px}.table-wrap{margin:0 -8px;border-radius:0;border-left:none;border-right:none}.rec-grid{grid-template-columns:1fr}.filter-row{gap:4px}.f-btn{padding:4px 10px;font-size:10px}}

<script>
const DEF=[
  {name:'7N40',caliber:'5.45×39',pen:58,damage:47,armorDmg:54,priceNum:960,price:'960₽',source:'跳蚤/商人',armorClass:5,color:'#ff6644'},
  {name:'7N39',caliber:'5.45×39',pen:50,damage:54,armorDmg:48,priceNum:750,price:'750₽',source:'帕帕商人',armorClass:5,color:'#ff8844'},
  {name:'M995',caliber:'5.56×45',pen:53,damage:40,armorDmg:57,priceNum:1850,price:'1,850₽',source:'跳蚤市场',armorClass:5,color:'#44aaff'},
  {name:'M855A1',caliber:'5.56×45',pen:48,damage:44,armorDmg:50,priceNum:980,price:'980₽',source:'和平卫士',armorClass:4,color:'#66bbff'},
  {name:'BP',caliber:'7.62×39',pen:46,damage:73,armorDmg:43,priceNum:380,price:'380₽',source:'帕帕商人',armorClass:4,color:'#ffaa44'},
  {name:'PS',caliber:'7.62×39',pen:36,damage:72,armorDmg:36,priceNum:180,price:'180₽',source:'帕帕商人',armorClass:3,color:'#ffcc66'},
  {name:'M61',caliber:'7.62×51',pen:61,damage:82,armorDmg:66,priceNum:3200,price:'3,200₽',source:'跳蚤/任务',armorClass:6,color:'#aa44ff'},
  {name:'M62',caliber:'7.62×51',pen:53,damage:77,armorDmg:58,priceNum:1400,price:'1,400₽',source:'跳蚤市场',armorClass:5,color:'#cc66ff'},
  {name:'PBP',caliber:'9×19',pen:38,damage:52,armorDmg:38,priceNum:580,price:'580₽',source:'机修工/跳蚤',armorClass:3,color:'#44ffaa'},
  {name:'RIP',caliber:'.45 ACP',pen:22,damage:79,armorDmg:25,priceNum:420,price:'420₽',source:'跳蚤市场',armorClass:2,color:'#ff4488'}
];
const RECS=[
  {armor:'1-2级甲',name:'RIP (.45 ACP)',pen:22,price:'420₽'},
  {armor:'3-4级甲',name:'BP (7.62×39)',pen:46,price:'380₽'},
  {armor:'5级甲',name:'7N40 (5.45×39)',pen:58,price:'960₽'},
  {armor:'6级甲',name:'M61 (7.62×51)',pen:61,price:'3,200₽'}
];
let allAmmo=[],calFilter='',sortKey='pen',sortDir=-1;

function getLS(k){try{const d=localStorage.getItem('tarkov_'+k);return d?JSON.parse(d):null;}catch{return null;}}
async function loadData(){
  let data=getLS('ammo');
  if(!data||!data.length){
    try{const r=await fetch('data/ammo.json?t='+Date.now());if(r.ok){const j=await r.json();data=j.ammo||j||[];}}catch(e){}
  }
  allAmmo=(data&&data.length?data:DEF).map(a=>({...a,pen:a.pen||a.penetration||0,armorDmg:a.armorDmg||a.armorDamage||0,priceNum:a.priceNum||(typeof a.price==='number'?a.price:parseInt((a.price||'0').replace(/[^\d]/g,'')))||0}));
  renderRec();
  render();
}

function renderRec(){
  document.getElementById('recGrid').innerHTML=RECS.map(r=>`
  <div class="rec-card">
    <div class="rec-armor">${r.armor}</div>
    <div class="rec-name">${r.name}</div>
    <div class="rec-pen">穿透：${r.pen}</div>
    <div class="rec-price">${r.price}</div>
  </div>`).join('');
}

function render(){
  let data=[...allAmmo];
  if(calFilter) data=data.filter(a=>a.caliber===calFilter);
  data.sort((a,b)=>{
    const av=a[sortKey],bv=b[sortKey];
    if(typeof av==='string') return sortDir*av.localeCompare(bv,'zh');
    return sortDir*((av||0)-(bv||0));
  });
  document.getElementById('sortInfo').innerHTML=`共 <b style="color:var(--gold)">${data.length}</b> 条数据 · 点击表头排序`;
  const colors=['#ff6644','#44aaff','#ffaa44','#aa44ff','#44ffaa','#ff4488','#ffcc44','#44ccff','#ff88aa','#88ff44'];
  document.getElementById('ammoTbody').innerHTML=data.length?data.map((a,i)=>{
    const pct=Math.min(100,Math.round((a.pen/70)*100));
    const pc=a.pen>=50?'v-hi':a.pen>=35?'v-md':'v-lo';
    const dc=a.damage>=70?'v-hi':a.damage>=50?'v-md':'v-lo';
    const ac=a.armorClass||0;
    const acs=[1,2,3,4,5,6].map(n=>{const cls=n<=ac?'armc-y':n===ac+1?'armc-m':'armc-n';return `<span class="armc ${cls}">${n}</span>`;}).join('');
    const pr=a.price||(a.priceNum?a.priceNum.toLocaleString()+'₽':'-');
    return `<tr>
      <td><div class="td-name"><span class="cal-dot" style="background:${a.color||colors[i%colors.length]}"></span>${a.name}</div></td>
      <td><span style="font-size:10px;background:var(--bg2);border:1px solid var(--border);padding:2px 7px;border-radius:3px;color:var(--text2)">${a.caliber}</span></td>
      <td><div class="pen-wrap"><div class="pen-track"><div class="pen-fill" style="width:${pct}%"></div></div><span class="${pc}">${a.pen}</span></div></td>
      <td class="${dc}">${a.damage}</td>
      <td>${a.armorDmg}%</td>
      <td><div class="armc-wrap">${acs}</div></td>
      <td style="color:var(--gold);font-family:var(--mono)">${pr}</td>
      <td style="font-size:11px;color:var(--text3)">${a.source||'-'}</td>
    </tr>`;
  }).join(''):'<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text3)">暂无该口径弹药数据</td></tr>';
}

function filterCal(btn,cal){
  calFilter=cal;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function doSort(key){
  document.querySelectorAll('th').forEach(th=>{th.classList.remove('sort-asc','sort-desc');if(th.getAttribute('onclick')?.includes(key)===false&&th.classList.contains('sortable')){}});
  sortDir=sortKey===key?sortDir*-1:-1;
  sortKey=key;
  document.querySelectorAll('th').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc','sortable');
    const oc=th.getAttribute('onclick')||'';
    if(oc.includes(key)){th.classList.add(sortDir===-1?'sort-desc':'sort-asc');}
    else if(oc.includes('doSort')){th.classList.add('sortable');}
  });
  render();
}
/* ── 搜索/菜单 ── */
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open')}
function openSearch(){document.getElementById('searchOv').classList.add('on');setTimeout(()=>document.getElementById('smInput')?.focus(),100)}
function closeSearch(){document.getElementById('searchOv').classList.remove('on');document.getElementById('searchResults').style.display='none'}
function closeSearchOv(e){if(e.target===document.getElementById('searchOv'))closeSearch()}
const searchData=[];let searchIdx=0;
async function initSearch(){
  try{const r=await fetch('data/articles.json?t='+Date.now());if(r.ok){const j=await r.json();const arts=j.articles||j||[];arts.forEach(a=>{if(a.title){searchData.push({title:a.title,icon:a.icon||'📄',url:'article.html?id='+(a.id||encodeURIComponent(a.title)),cat:a.categoryName||a.categoryLabel||'攻略',type:'article'})}})}}
  catch(e){}
  try{const r=await fetch('data/ammo.json?t='+Date.now());if(r.ok){const j=await r.json();(j.ammo||j||[]).forEach(a=>{if(a.name){searchData.push({title:a.name+' ('+a.caliber+')',icon:'💊',url:'ammo.html?caliber='+encodeURIComponent(a.caliber),cat:'弹药',type:'ammo'})}})}}
  catch(e){}
}
function doSearch(kw){
  kw=kw.trim().toLowerCase();
  const el=document.getElementById('searchResults');
  if(!kw){el.style.display='none';return}
  const results=searchData.filter(s=>s.title.toLowerCase().includes(kw)).slice(0,8);
  if(!results.length){el.style.display='block';el.innerHTML='<div class="sr-empty">未找到相关内容</div>';return}
  el.style.display='block';
  el.innerHTML=results.map(r=>`<a href="${r.url}" class="sr-item"><span class="sr-icon">${r.icon}</span><div class="sr-body"><div class="sr-title">${r.title}</div><span class="sr-cat">${r.cat}</span></div></a>`).join('');
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch()}if(e.key==='Escape')closeSearch()});
initSearch();
loadData();
</script>
</body>
