<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="逃离塔科夫攻略文章大全，包含武器、地图、经济、新手指南等全类型攻略">
<title>攻略文章 | 塔科夫攻略站</title>
<style>
:root{--bg1:#0a0c0f;--bg2:#111418;--bg3:#161b21;--bg4:#1c232b;--border:#2a3540;--gold:#c8a96e;--gold3:#a07840;--text1:#eae0cc;--text2:#9aabb8;--text3:#5a7080;--green2:#6aaa7a;--red2:#c05050;--blue2:#4a80b0;--orange2:#e09050;--purple2:#9060d0;--font:'Segoe UI','Microsoft YaHei',sans-serif;--r:4px;--r2:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg1);color:var(--text1);font-family:var(--font);line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px}
a{text-decoration:none;color:inherit;transition:all .2s}
/* 导航 */
.nav{position:sticky;top:0;z-index:1000;height:60px;background:rgba(10,12,15,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;gap:16px}
.nav-logo{display:flex;align-items:center;gap:10px;color:inherit}
.mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#07090b}
.logo-name{font-size:17px;font-weight:800;letter-spacing:2px}.logo-name span{color:var(--gold)}
.nav-links{display:flex;gap:2px;list-style:none;flex:1;justify-content:center}
.nav-links a{padding:7px 12px;border-radius:var(--r);font-size:13px;color:var(--text2);font-weight:500;white-space:nowrap}
.nav-links a:hover{color:var(--text1);background:var(--bg3)}
.nav-links a.active{color:var(--gold);background:rgba(200,169,110,.07)}
button{font-family:var(--font);cursor:pointer}
.nav-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.nav-search-btn{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:var(--r);font-size:12px;transition:all .2s;white-space:nowrap}
.nav-search-btn:hover{border-color:var(--gold);color:var(--gold)}
.nav-burger{display:none;flex-direction:column;gap:5px;background:transparent;border:none;padding:4px}
.nav-burger span{display:block;width:22px;height:2px;background:var(--text2);border-radius:2px}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(10,12,15,.98);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:999;padding:12px 0}
.mobile-menu.open{display:block}
.mobile-menu a{display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:14px;color:var(--text2);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.03)}
.mobile-menu a:hover{color:var(--gold);background:rgba(200,169,110,.05)}
.ver{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 6px;border-radius:3px;font-family:var(--mono);margin-left:-4px}
/* 页头 */
.page-hero{background:linear-gradient(135deg,rgba(42,80,112,.15),rgba(22,27,33,.9));border-bottom:1px solid var(--border);padding:48px 32px}
.page-hero-inner{max-width:1200px;margin:0 auto}
.page-hero h1{font-size:32px;font-weight:900;margin-bottom:8px}
.page-hero h1 span{color:var(--gold)}
.page-hero p{font-size:14px;color:var(--text2)}
/* 主体 */
.wrap{max-width:1200px;margin:0 auto;padding:40px 32px}
/* 筛选栏 */
.filter-bar{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;align-items:center}
.filter-bar .label{font-size:12px;color:var(--text3);margin-right:4px}
.cat-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:16px;font-size:12px;cursor:pointer;transition:all .2s}
.cat-btn:hover,.cat-btn.on{background:rgba(200,169,110,.08);border-color:var(--gold);color:var(--gold)}
.search-wrap{position:relative;margin-left:auto}
.search-wrap input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px 8px 34px;font-size:12px;color:var(--text1);outline:none;width:220px;font-family:var(--font);transition:border-color .2s}
.search-wrap input:focus{border-color:var(--gold)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
/* 文章网格 */
.articles-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.art-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:20px;display:flex;gap:16px;cursor:pointer;transition:all .25s;text-decoration:none;color:inherit}
.art-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.art-icon{width:48px;height:48px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.art-body{flex:1;min-width:0}
.art-cat{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.cat-guide{color:var(--gold)}.cat-weapon{color:var(--blue2)}.cat-map{color:var(--green2)}.cat-economy{color:var(--orange2)}.cat-newbie{color:var(--purple2)}
.art-title{font-size:14px;font-weight:600;color:var(--text1);margin-bottom:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-card:hover .art-title{color:var(--gold)}
.art-summary{font-size:12px;color:var(--text3);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-meta{display:flex;gap:10px;font-size:11px;color:var(--text3);flex-wrap:wrap}
.art-badges{display:flex;gap:5px;margin-top:8px}
.badge-hot{font-size:9px;background:rgba(192,80,80,.15);color:var(--red2);border:1px solid rgba(192,80,80,.2);padding:2px 7px;border-radius:3px;font-weight:800}
.badge-new{font-size:9px;background:rgba(74,140,92,.15);color:var(--green2);border:1px solid rgba(74,140,92,.2);padding:2px 7px;border-radius:3px;font-weight:800}
/* 空状态 */
.empty{text-align:center;padding:60px;color:var(--text3);grid-column:1/-1}
.empty-icon{font-size:40px;margin-bottom:12px}
/* 统计 */
.stats-bar{display:flex;gap:20px;margin-bottom:20px;font-size:12px;color:var(--text3)}
.stats-bar strong{color:var(--gold)}
/* 页脚 */
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:24px 32px;margin-top:60px}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;font-size:12px;color:var(--text3);flex-wrap:wrap;gap:8px}
.footer-inner a:hover{color:var(--gold)}
@media(max-width:900px){.nav-links{display:none}.nav-burger{display:flex}.articles-grid{grid-template-columns:1fr}.wrap{padding:32px 16px}.page-hero{padding:32px 16px}.nav-search-btn span{display:none}}
@media(max-width:500px){.search-wrap{margin-left:0;width:100%}.search-wrap input{width:100%}}
@media(max-width:480px){.page-h1{font-size:20px}.page-sub{font-size:14px}.article-card{padding:12px}.ac-title{font-size:13px}.search-wrap input{padding:10px 14px;font-size:12px}}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-logo" href="index.html"><div class="mark">⚔</div><span class="logo-name">TARKOV<span>GUIDE</span></span><span class="ver">v1.0.0</span></a>
  <ul class="nav-links">
    <li><a href="index.html">🏠 首页</a></li>
    <li><a href="maps.html">🗺️ 地图</a></li>
    <li><a href="ammo.html">💊 弹药</a></li>
    <li><a href="loadouts.html">🔫 武器</a></li>
    <li><a href="quests.html">📋 任务</a></li>
    <li><a href="articles.html" class="active">📰 攻略</a></li>
  </ul>
  <div class="nav-right">
    <button class="nav-search-btn" onclick="openSearch()">🔍 搜索 <kbd>Ctrl+K</kbd></button>
    <button class="nav-burger" onclick="toggleMenu()" id="burgerBtn"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">🏠 首页</a>
  <a href="maps.html">🗺️ 地图攻略</a>
  <a href="ammo.html">💊 弹药数据</a>
  <a href="loadouts.html">🔫 武器配装</a>
  <a href="quests.html">📋 任务攻略</a>
  <a href="articles.html">📰 全部攻略</a>
</div>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>📰 攻略<span>文章</span></h1>
    <p>深度攻略 · 每日更新 · 版本同步 · 助你称霸塔科夫</p>
  </div>
</div>

<div class="wrap">
  <div class="filter-bar">
    <span class="label">分类：</span>
    <button class="cat-btn on" onclick="filterCat(this,'')">全部</button>
    <button class="cat-btn" onclick="filterCat(this,'weapon')">🔫 武器攻略</button>
    <button class="cat-btn" onclick="filterCat(this,'map')">🗺️ 地图攻略</button>
    <button class="cat-btn" onclick="filterCat(this,'guide')">📖 游戏指南</button>
    <button class="cat-btn" onclick="filterCat(this,'economy')">💰 经济攻略</button>
    <button class="cat-btn" onclick="filterCat(this,'newbie')">🎮 新手必看</button>
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" placeholder="搜索文章..." oninput="filterSearch(this.value)" id="searchInput">
    </div>
  </div>
  <div class="stats-bar"><span>共 <strong id="totalCount">0</strong> 篇文章</span></div>
  <div class="articles-grid" id="articlesGrid"></div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <span>© 2024 TarkovGuide · <a href="index.html">返回首页</a></span>
    <span>非官方粉丝攻略站 · 仅供参考</span>
  </div>
</footer>

<script>
const DEF=[
  {id:'m4a1-build',title:'0.15版本最强武器配装排行：M4A1完全改装指南与平替方案',category:'weapon',categoryName:'武器攻略',icon:'🔫',date:'2024-01-15',hot:true,isNew:false,views:24380,summary:'本文详细分析了0.15版本M4A1的最优改装方案，包含3个预算档位的推荐'},
  {id:'dark-corner',title:'新地图「黑暗之角」完全攻略：所有出口、物资点、Boss位置全标注',category:'map',categoryName:'地图攻略',icon:'🗺️',date:'2024-01-15',hot:false,isNew:true,views:18640,summary:'黑暗之角是0.15版本新增的中型地图，本文包含所有出口条件和物资刷新点'},
  {id:'ammo-rank',title:'弹道系统重做后弹药重新排行：哪些弹药值得继续用？完整对比',category:'guide',categoryName:'游戏指南',icon:'💊',date:'2024-01-15',hot:false,isNew:true,views:15200,summary:'0.15弹道系统大改后的弹药格局完整分析'},
  {id:'money-guide',title:'2024最快刷卢布攻略：藏匿处比特币农场+海关资源线路，每小时50W+',category:'economy',categoryName:'经济攻略',icon:'💰',date:'2024-01-14',hot:true,isNew:false,views:32100,summary:'目前游戏中效率最高的卢布获取路线，每小时稳定50W+'},
  {id:'newbie',title:'逃离塔科夫2024新手完全入门指南：从第一局到稳定生存的完整路线',category:'newbie',categoryName:'新手必看',icon:'🎮',date:'2024-01-12',hot:true,isNew:false,views:88400,summary:'从零基础到稳定生存的完整入门路线，包含机制、地图、经济全讲解'}
];
const catStyle={guide:'cat-guide',weapon:'cat-weapon',map:'cat-map',economy:'cat-economy',newbie:'cat-newbie'};
let allArticles=[];
let currentCat='';
let currentKw='';

function getLS(k){try{const d=localStorage.getItem('tarkov_'+k);return d?JSON.parse(d):null;}catch{return null;}}

async function loadData(){
  let data=getLS('articles');
  if(!data||!data.length){
    try{
      const r=await fetch('data/articles.json?t='+Date.now());
      if(r.ok){const j=await r.json();data=j.articles||j||[];}
    }catch(e){}
  }
  allArticles=data&&data.length?data:DEF;
  // URL参数筛选
  const p=new URLSearchParams(location.search);
  const cat=p.get('cat');
  if(cat){
    currentCat=cat;
    document.querySelectorAll('.cat-btn').forEach(b=>{
      b.classList.toggle('on',b.textContent.includes(getCatLabel(cat))||(!cat&&b.textContent==='全部'));
    });
  }
  renderArticles();
}

function getCatLabel(cat){const m={weapon:'武器',map:'地图',guide:'指南',economy:'经济',newbie:'新手'};return m[cat]||'';}

function renderArticles(){
  let data=[...allArticles];
  if(currentCat) data=data.filter(a=>a.category===currentCat);
  if(currentKw) data=data.filter(a=>a.title.includes(currentKw)||a.summary?.includes(currentKw)||(a.tags||[]).some(t=>t.includes(currentKw)));
  document.getElementById('totalCount').textContent=data.length;
  if(!data.length){
    document.getElementById('articlesGrid').innerHTML='<div class="empty"><div class="empty-icon">📭</div><div>暂无相关文章</div></div>';
    return;
  }
  document.getElementById('articlesGrid').innerHTML=data.map(a=>{
    const id=a.id||encodeURIComponent(a.title);
    return `<a href="article.html?id=${id}" class="art-card">
      <div class="art-icon">${a.icon||'📄'}</div>
      <div class="art-body">
        <div class="art-cat ${catStyle[a.category]||'cat-guide'}">${a.categoryName||a.categoryLabel||''}</div>
        <div class="art-title">${a.title}</div>
        <div class="art-summary">${a.summary||''}</div>
        <div class="art-meta">
          <span>👁 ${(a.views||0).toLocaleString()}</span>
          <span>🕐 ${a.date||a.timeAgo||''}</span>
        </div>
        <div class="art-badges">
          ${a.hot||a.badge==='hot'?'<span class="badge-hot">🔥 HOT</span>':''}
          ${a.isNew||a.badge==='new'?'<span class="badge-new">✨ NEW</span>':''}
        </div>
      </div>
    </a>`;
  }).join('');
}

function filterCat(btn,cat){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderArticles();
}
function filterSearch(kw){currentKw=kw;renderArticles();}
/* ── 菜单 ── */
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){const m=document.getElementById('mobileMenu');if(m.classList.contains('open'))m.classList.remove('open')}});
loadData();
</script>
</body>
</html>
