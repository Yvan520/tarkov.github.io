<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>任务攻略 | 塔科夫攻略站</title>
<style>
:root{--bg1:#0a0c0f;--bg2:#111418;--bg3:#161b21;--border:#2a3540;--gold:#c8a96e;--gold3:#a07840;--text1:#eae0cc;--text2:#9aabb8;--text3:#5a7080;--green2:#6aaa7a;--red2:#c05050;--blue2:#4a80b0;--orange2:#e09050;--purple2:#9060d0;--font:'Segoe UI','Microsoft YaHei',sans-serif;--r:4px;--r2:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg1);color:var(--text1);font-family:var(--font);line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:3px}
a{text-decoration:none;color:inherit}
.nav{position:sticky;top:0;z-index:1000;height:60px;background:rgba(10,12,15,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;gap:16px}
.nav-logo{display:flex;align-items:center;gap:10px}
.mark{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#07090b}
.logo-name{font-size:17px;font-weight:800;letter-spacing:2px}.logo-name span{color:var(--gold)}
.nav-links{display:flex;gap:2px;list-style:none;flex:1;justify-content:center}
.nav-links a{padding:7px 12px;border-radius:var(--r);font-size:13px;color:var(--text2);white-space:nowrap}
.nav-links a:hover{color:var(--text1);background:var(--bg3)}
.nav-links a.active{color:var(--gold);background:rgba(200,169,110,.07)}
.page-hero{background:linear-gradient(135deg,rgba(42,80,112,.15),rgba(22,27,33,.9));border-bottom:1px solid var(--border);padding:48px 32px}
.page-hero-inner{max-width:1200px;margin:0 auto}
.page-hero h1{font-size:32px;font-weight:900;margin-bottom:8px}.page-hero h1 span{color:var(--gold)}
.page-hero p{font-size:14px;color:var(--text2)}
.wrap{max-width:1200px;margin:0 auto;padding:40px 32px;display:grid;grid-template-columns:220px 1fr;gap:28px;align-items:start}
/* 左侧商人菜单 */
.merchants-sidebar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;position:sticky;top:80px}
.sidebar-title{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.merchant-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:all .2s;border-bottom:1px solid rgba(255,255,255,.04);border-left:3px solid transparent}
.merchant-item:last-child{border-bottom:none}
.merchant-item:hover{background:rgba(200,169,110,.04)}
.merchant-item.on{background:rgba(200,169,110,.07);border-left-color:var(--gold)}
.merchant-icon{font-size:18px}
.merchant-name{font-size:13px;font-weight:600;color:var(--text2)}
.merchant-item.on .merchant-name{color:var(--gold)}
.merchant-count{margin-left:auto;font-size:10px;background:var(--bg2);border:1px solid var(--border);color:var(--text3);padding:1px 6px;border-radius:10px}
/* 右侧内容 */
.quests-main{}
.quests-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.quests-header h2{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.quests-header h2::before{content:'';width:4px;height:22px;background:linear-gradient(180deg,var(--gold),transparent);border-radius:2px}
.diff-filter{display:flex;gap:6px;flex-wrap:wrap}
.d-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:14px;font-size:11px;cursor:pointer;transition:all .2s}
.d-btn:hover,.d-btn.on{background:rgba(200,169,110,.08);border-color:var(--gold);color:var(--gold)}
/* 任务卡片 */
.quest-list{display:flex;flex-direction:column;gap:12px}
.qc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:all .25s;cursor:pointer}
.qc:hover{border-color:var(--gold)}
.qc-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;gap:10px}
.qc-left{flex:1;min-width:0}
.qc-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:4px}
.qc-desc{font-size:12px;color:var(--text2)}
.qc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.qc-diff{font-size:9px;font-weight:800;padding:3px 9px;border-radius:3px;white-space:nowrap}
.qc-expand{font-size:18px;color:var(--text3);transition:transform .25s}
.qc.open .qc-expand{transform:rotate(90deg);color:var(--gold)}
.qc-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.qc.open .qc-body{display:block}
.qc-rewards{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;margin-bottom:12px}
.qr{font-size:11px;padding:4px 10px;border-radius:3px;display:flex;align-items:center;gap:4px}
.qr-exp{background:rgba(200,169,110,.1);color:var(--gold)}
.qr-rep{background:rgba(74,128,176,.15);color:var(--blue2)}
.qr-item{background:rgba(74,140,92,.15);color:var(--green2)}
.qc-guide{background:var(--bg2);border-radius:var(--r);padding:12px;font-size:12px;color:var(--text2);line-height:1.7}
.qc-guide p{margin-bottom:6px}
.qc-guide p:last-child{margin-bottom:0}
/* 空状态 */
.empty{text-align:center;padding:60px;color:var(--text3)}
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:24px 32px;margin-top:60px}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;font-size:12px;color:var(--text3);flex-wrap:wrap;gap:8px}
.footer-inner a:hover{color:var(--gold)}
button{font-family:var(--font);cursor:pointer}
.nav-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.nav-search-btn{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:var(--r);font-size:12px;transition:all .2s;white-space:nowrap}
.nav-search-btn:hover{border-color:var(--gold);color:var(--gold)}
.nav-burger{display:none;flex-direction:column;gap:5px;background:transparent;border:none;padding:4px}
.nav-burger span{display:block;width:22px;height:2px;background:var(--text2);border-radius:2px}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(10,12,15,.98);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:999;padding:12px 0}
.mobile-menu.open{display:block}
.mobile-menu a{display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:14px;color:var(--text2);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.03)}
.mobile-menu a:hover{color:var(--gold);background:rgba(200,169,110,.05)}
.search-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:80px 20px 20px;opacity:0;visibility:hidden;transition:all .25s}
.search-ov.on{opacity:1;visibility:visible}
.search-box{width:100%;max-width:640px}
.sm-wrap{position:relative;margin-bottom:14px}
.sm-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--gold);pointer-events:none}
.sm-input{width:100%;background:var(--bg3);border:2px solid var(--gold);border-radius:var(--r2);padding:16px 52px;font-size:16px;color:var(--text1);outline:none;font-family:var(--font);box-shadow:0 0 32px rgba(200,169,110,.15)}
.sm-input::placeholder{color:var(--text3)}
.sm-esc{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--bg2);border:1px solid var(--border);color:var(--text2);width:36px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;font-family:var(--mono)}
.search-results{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;margin-top:8px}
.sr-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border-radius:var(--r);cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}
.sr-item:hover{background:var(--bg4);border-left:2px solid var(--gold)}
.sr-icon{font-size:18px;flex-shrink:0}
.sr-body{flex:1;min-width:0}
.sr-title{font-size:13px;font-weight:600;color:var(--text1)}
.sr-cat{font-size:10px;color:var(--text3)}
.sr-empty{text-align:center;padding:24px;color:var(--text3);font-size:13px}
.ver{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 6px;border-radius:3px;font-family:var(--mono);margin-left:-4px}
@media(max-width:900px){.nav-links{display:none}.wrap{grid-template-columns:1fr}.merchants-sidebar{position:static}.page-hero{padding:32px 16px}.wrap{padding:32px 16px}.nav-right{gap:4px}.nav-search-btn span{display:none}.nav-burger{display:flex}.search-ov{padding:60px 12px 12px}}
@media(max-width:480px){.page-h1{font-size:20px}.page-sub{font-size:14px}.q-card{padding:12px}.q-name{font-size:13px}.q-desc{font-size:11px}.qs-list{gap:8px}}
</style>

<script>
const DEF=[
  {name:'肮脏的商业行为',merchant:'帕帕',merchantIcon:'🦔',difficulty:'简单',exp:7800,desc:'在海关地图找到3个电脑，带出指定数据存储设备',rewardItem:'AK-74N',guide:'前往海关三层宿舍，在办公室和居住区寻找台式电脑。找到后互动获取存储设备，带出地图即可完成。建议轻装进入，从工厂出口撤离。'},
  {name:'工厂突袭',merchant:'帕帕',merchantIcon:'🦔',difficulty:'中等',exp:12400,desc:'在工厂地图击杀5名SCAV卫兵，不能死亡才算完成',rewardItem:'防弹背心',guide:'进入工厂地图，SCAV分布在各个角落。建议使用冲锋枪近距离作战，注意不要被玩家突袭。完成后从办公楼出口撤离。'},
  {name:'关键情报',merchant:'机修工',merchantIcon:'🔧',difficulty:'困难',exp:24800,desc:'从储备基地的地下室找到情报文件，需要钥匙RB-AK',rewardItem:'60发弹匣×4',guide:'先从跳蚤市场或其他玩家处获取RB-AK钥匙。进入储备基地后，前往地下停机坪附近的储藏室。开锁后在货架上找到情报文件，带出地图完成。'},
  {name:'医疗物资收集',merchant:'治疗者',merchantIcon:'🩺',difficulty:'简单',exp:5200,desc:'收集5个SALEWA急救包并成功撤离，建议在海岸线医院寻找',rewardItem:'医疗箱×3',guide:'前往海岸线度假村的医院区域，SALEWA多在医疗柜和急救箱中。地图较大注意规划撤离路线。'},
  {name:'最后的边界',merchant:'犹大',merchantIcon:'👨‍💼',difficulty:'极难',exp:68000,desc:'在实验室击杀狂人Boss并带出其狗牌，生存状态撤离',rewardItem:'顶级装备箱',guide:'需要实验室通行证才能进入。建议组队4人以上，全员高配装备。狂人会在地图随机位置巡逻，击杀后拾取狗牌，从飞机库（需4人激活）撤离。'},
  {name:'铁路巡逻',merchant:'铁路员',merchantIcon:'🚂',difficulty:'中等',exp:15600,desc:'在储备基地标记3个铁路信号点位置',rewardItem:'弹药箱×2',guide:'储备基地内有3个铁路信号点，分别位于地图北侧、中部铁路和南侧站台。每个信号点互动后标记完成。注意格鲁特Boss可能在附近出没。'},
  {name:'零件收集',merchant:'机修工',merchantIcon:'🔧',difficulty:'简单',exp:5800,desc:'收集散落在海关地图的机械零件并交给机修工',rewardItem:'工具箱',guide:'机械零件可以在海关工厂区域、维修车间和停车场找到。总共需要收集5个，注意带足背包容量。'},
  {name:'和平协议',merchant:'和平卫士',merchantIcon:'🎖️',difficulty:'中等',exp:18000,desc:'在森林地图找到并消灭沙皇Boss的手下',rewardItem:'M4A1改装版',guide:'沙皇Boss率领4-6名手下在森林地图巡逻。建议使用狙击枪远程解决，注意开阔地带的视野优势。'}
];
const MERCHANTS=[
  {name:'全部任务',icon:'📋',key:''},
  {name:'帕帕',icon:'🦔',key:'帕帕'},
  {name:'机修工',icon:'🔧',key:'机修工'},
  {name:'治疗者',icon:'🩺',key:'治疗者'},
  {name:'和平卫士',icon:'🎖️',key:'和平卫士'},
  {name:'铁路员',icon:'🚂',key:'铁路员'},
  {name:'犹大',icon:'👨‍💼',key:'犹大'}
];
const diffStyle={'简单':'background:rgba(74,140,92,.2);color:#6aaa7a','中等':'background:rgba(192,112,48,.2);color:#e09050','困难':'background:rgba(192,80,80,.2);color:#c05050','极难':'background:rgba(144,48,200,.2);color:#9060d0','easy':'background:rgba(74,140,92,.2);color:#6aaa7a','medium':'background:rgba(192,112,48,.2);color:#e09050','hard':'background:rgba(192,80,80,.2);color:#c05050','extreme':'background:rgba(144,48,200,.2);color:#9060d0'};
let allQuests=[],merchantFilter='',diffFilter='';

function getLS(k){try{const d=localStorage.getItem('tarkov_'+k);return d?JSON.parse(d):null;}catch{return null;}}
async function loadData(){
  let data=getLS('quests');
  if(!data||!data.length){
    try{const r=await fetch('data/quests.json?t='+Date.now());if(r.ok){const j=await r.json();data=j.quests||j||[];}}catch(e){}
  }
  allQuests=data&&data.length?data:DEF;
  renderMerchants();
  renderQuests();
}

function renderMerchants(){
  document.getElementById('merchantList').innerHTML=MERCHANTS.map(m=>{
    const count=m.key?allQuests.filter(q=>(q.merchant||'').includes(m.key)).length:allQuests.length;
    return `<div class="merchant-item ${merchantFilter===m.key?'on':''}" onclick="selectMerchant('${m.key}','${m.name}')">
      <span class="merchant-icon">${m.icon}</span>
      <span class="merchant-name">${m.name}</span>
      <span class="merchant-count">${count}</span>
    </div>`;
  }).join('');
}

function selectMerchant(key,name){
  merchantFilter=key;
  document.getElementById('currentMerchantTitle').textContent=name==='全部任务'?'全部任务':name+' 的任务';
  renderMerchants();
  renderQuests();
}

function renderQuests(){
  let data=[...allQuests];
  if(merchantFilter) data=data.filter(q=>(q.merchant||'').includes(merchantFilter));
  if(diffFilter) data=data.filter(q=>q.difficulty===diffFilter||q.diffLabel===diffFilter);
  if(!data.length){document.getElementById('questList').innerHTML='<div class="empty">暂无相关任务数据</div>';return;}
  document.getElementById('questList').innerHTML=data.map((q,i)=>{
    const diff=q.diffLabel||q.difficulty||'';
    const desc=q.description||q.desc||'';
    const reward=q.rewardItem||q.itemReward||'';
    const exp=q.exp?Number(q.exp).toLocaleString():'';
    const rep=q.rep||'';
    const guide=q.guide||'暂无详细攻略，欢迎在评论区分享你的经验！';
    return `<div class="qc" id="qc${i}">
      <div class="qc-hd" onclick="toggleQ(${i})">
        <div class="qc-left">
          <div class="qc-name">${q.name}</div>
          <div class="qc-desc">${desc}</div>
        </div>
        <div class="qc-right">
          <span class="qc-diff" style="${diffStyle[diff]||''}">${diff}</span>
          <span>${q.merchantIcon||''} ${q.merchant||''}</span>
        </div>
        <span class="qc-expand">›</span>
      </div>
      <div class="qc-body">
        <div class="qc-rewards">
          ${exp?`<span class="qr qr-exp">⭐ ${exp} EXP</span>`:''}
          ${rep?`<span class="qr qr-rep">📈 声誉 ${rep}</span>`:''}
          ${reward?`<span class="qr qr-item">🎁 ${reward}</span>`:''}
        </div>
        <div class="qc-guide">${guide.split('\n').map(l=>l.trim()?`<p>${l}</p>`:'').join('')}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleQ(i){
  const el=document.getElementById('qc'+i);
  el.classList.toggle('open');
}

function filterDiff(btn,d){
  diffFilter=d;
  document.querySelectorAll('.d-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderQuests();
}
/* ── 搜索/菜单 ── */
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open')}
function openSearch(){document.getElementById('searchOv').classList.add('on');setTimeout(()=>document.getElementById('smInput')?.focus(),100)}
function closeSearch(){document.getElementById('searchOv').classList.remove('on');document.getElementById('searchResults').style.display='none'}
function closeSearchOv(e){if(e.target===document.getElementById('searchOv'))closeSearch()}
const searchData=[];
async function initSearch(){
  try{const r=await fetch('data/articles.json?t='+Date.now());if(r.ok){const j=await r.json();const arts=j.articles||j||[];arts.forEach(a=>{if(a.title){searchData.push({title:a.title,icon:a.icon||'📄',url:'article.html?id='+(a.id||encodeURIComponent(a.title)),cat:a.categoryName||a.categoryLabel||'攻略',type:'article'})}})}}
  catch(e){}
}
function doSearch(kw){
  kw=kw.trim().toLowerCase();
  const el=document.getElementById('searchResults');
  if(!kw){el.style.display='none';return}
  const results=searchData.filter(s=>s.title.toLowerCase().includes(kw)).slice(0,8);
  if(!results.length){el.style.display='block';el.innerHTML='<div class="sr-empty">未找到相关内容</div>';return}
  el.style.display='block';
  el.innerHTML=results.map(r=>`<a href="${r.url}" class="sr-item"><span class="sr-icon">${r.icon}</span><div class="sr-body"><div class="sr-title">${r.title}</div><span class="sr-cat">${r.cat}</span></div></a>`).join('');
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch()}if(e.key==='Escape')closeSearch()});
initSearch();
loadData();
</script>
</body>
</html>
