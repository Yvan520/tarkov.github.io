];
const mapBg={customs:'linear-gradient(135deg,#1a2a1a,#2a3a2a)',woods:'linear-gradient(135deg,#1a2a15,#2a3a1a)',interchange:'linear-gradient(135deg,#1a1a2a,#252535)',reserve:'linear-gradient(135deg,#252525,#352525)',shoreline:'linear-gradient(135deg,#15252a,#1a3040)',labs:'linear-gradient(135deg,#0a1520,#102030)',factory:'linear-gradient(135deg,#1a1510,#2a2018)',lighthouse:'linear-gradient(135deg,#101a20,#182535)',darkcorner:'linear-gradient(135deg,#0d0d1a,#1a0a2a)',center:'linear-gradient(135deg,#1a2028,#253040)',groundzero:'linear-gradient(135deg,#1a1520,#2a2030)'};
const diffClass={'新手友好':'d-easy','easy':'d-easy','中等':'d-mid','medium':'d-mid','困难':'d-hard','hard':'d-hard','极难':'d-ex','extreme':'d-ex'};
let allMaps=[],diffFilter='',activeId='';

function getLS(k){try{const d=localStorage.getItem('tarkov_'+k);return d?JSON.parse(d):null;}catch{return null;}}
async function loadData(){
  let data=getLS('maps');
  if(!data||!data.length){
    try{const r=await fetch('data/maps.json?t='+Date.now());if(r.ok){const j=await r.json();data=j.maps||j||[];}}catch(e){}
  }
  // 合并默认数据中的详细信息
  allMaps=(data&&data.length?data:DEF_MAPS).map(m=>{
    const def=DEF_MAPS.find(d=>d.id===m.id||d.name===m.name);
    return def?{...def,...m}:m;
  });
  // URL参数
  const p=new URLSearchParams(location.search);
  const id=p.get('id');
  renderMaps();
  if(id){
    const m=allMaps.find(m=>m.id===id||m.name===id);
    if(m) showDetail(m);
  }
}

function renderMaps(){
  let data=[...allMaps];
  if(diffFilter) data=data.filter(m=>m.difficulty===diffFilter||m.difficulty?.toLowerCase()===diffFilter.toLowerCase());
  if(!data.length){document.getElementById('mapsGrid').innerHTML='<div class="empty">暂无符合条件的地图</div>';return;}
  document.getElementById('mapsGrid').innerHTML=data.map(m=>{
    const bg=mapBg[m.id]||mapBg[m.nameEn?.toLowerCase()]||'linear-gradient(135deg,#1a2020,#202a2a)';
    const dc=diffClass[m.difficulty]||'d-mid';
    const tags=Array.isArray(m.tags)?m.tags:(m.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
    return `<div class="map-card ${activeId===m.id?'active-card':''}" onclick="showDetail(${JSON.stringify(m).replace(/"/g,'&quot;')})">
      <div class="map-img" style="background:${bg}"><span>${m.icon||'🗺️'}</span><span class="map-diff ${dc}">${m.difficulty}</span></div>
      <div class="map-body">
        <div class="map-name">${m.name}<span class="map-name-en">${m.nameEn||''}</span></div>
        <div class="map-meta"><span>⏱ ${m.time}分钟</span><span>👥 ${m.players}人</span><span>🚪 ${m.exits}个出口</span>${m.boss?`<span>👹 ${m.boss}</span>`:''}</div>
        <div class="map-tags">${tags.map(t=>`<span class="map-tag">${t}</span>`).join('')}</div>
        <span class="map-btn">查看详情 →</span>
      </div>
    </div>`;
  }).join('');
}

function showDetail(m){
  if(typeof m==='string') m=JSON.parse(m);
  activeId=m.id;
  renderMaps();
  const exits=m.exits_list||[];
  const loot=m.loot||[];
  const tips=m.tips||[];
  document.getElementById('detailPanel').innerHTML=`
    <div class="detail-header">
      <div class="detail-icon">${m.icon||'🗺️'}</div>
      <div class="detail-title">
        <h2>${m.name} <span style="font-size:16px;color:var(--text3);font-weight:400">${m.nameEn||''}</span></h2>
        <div class="sub">${m.desc||'点击下方信息了解详细攻略'}</div>
      </div>
      <div class="close-btn" onclick="closeDetail()">✕</div>
    </div>
    <div class="detail-stats">
      <div class="ds-item"><span class="ds-val">${m.time}</span><span class="ds-label">分钟时长</span></div>
      <div class="ds-item"><span class="ds-val">${m.players}</span><span class="ds-label">最大玩家</span></div>
      <div class="ds-item"><span class="ds-val">${m.exits}</span><span class="ds-label">出口数量</span></div>
      <div class="ds-item"><span class="ds-val">${m.boss||'无'}</span><span class="ds-label">Boss</span></div>
    </div>
    <div class="detail-sections">
      ${exits.length?`<div class="ds-sec"><div class="ds-sec-title">🚪 出口列表</div><ul class="ds-list">${exits.map(e=>`<li>${e}</li>`).join('')}</ul></div>`:''}
      ${loot.length?`<div class="ds-sec"><div class="ds-sec-title">💰 主要物资点</div><ul class="ds-list">${loot.map(e=>`<li>${e}</li>`).join('')}</ul></div>`:''}
      ${tips.length?`<div class="ds-sec" style="grid-column:1/-1"><div class="ds-sec-title">💡 攻略要点</div><ul class="ds-list">${tips.map(e=>`<li>${e}</li>`).join('')}</ul></div>`:''}
    </div>`;
  document.getElementById('detailPanel').classList.add('show');
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

function closeDetail(){
  activeId='';
  document.getElementById('detailPanel').classList.remove('show');
  renderMaps();
}

function filterDiff(btn,d){
  diffFilter=d;
  document.querySelectorAll('.d-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  closeDetail();
  renderMaps();
}
/* ── 搜索/菜单 ── */
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open')}
function openSearch(){document.getElementById('searchOv').classList.add('on');setTimeout(()=>document.getElementById('smInput')?.focus(),100)}
function closeSearch(){document.getElementById('searchOv').classList.remove('on');document.getElementById('searchResults').style.display='none'}
function closeSearchOv(e){if(e.target===document.getElementById('searchOv'))closeSearch()}
const searchData=[];let searchIdx=0;
async function initSearch(){
  try{const r=await fetch('data/articles.json?t='+Date.now());if(r.ok){const j=await r.json();const arts=j.articles||j||[];arts.forEach(a=>{if(a.title){searchData.push({title:a.title,icon:a.icon||'📄',url:'article.html?id='+(a.id||encodeURIComponent(a.title)),cat:a.categoryName||a.categoryLabel||'攻略',type:'article'})}})}}
  catch(e){}
}
function doSearch(kw){
  kw=kw.trim().toLowerCase();
  const el=document.getElementById('searchResults');
  if(!kw){el.style.display='none';return}
  const results=searchData.filter(s=>s.title.toLowerCase().includes(kw)).slice(0,8);
  if(!results.length){el.style.display='block';el.innerHTML='<div class="sr-empty">未找到相关内容</div>';return}
  el.style.display='block';
  el.innerHTML=results.map(r=>`<a href="${r.url}" class="sr-item"><span class="sr-icon">${r.icon}</span><div class="sr-body"><div class="sr-title">${r.title}</div><span class="sr-cat">${r.cat}</span></div></a>`).join('');
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch()}if(e.key==='Escape')closeSearch()});
initSearch();
loadData();
</script>
