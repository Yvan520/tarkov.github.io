<script>
const DEF=[
  {name:'AK-74N',price:'～38,000₽',icon:'🔫',budget:'low',type:'pvp',recoil:47,ergo:52,weight:'3.8',ammo:'7N40',parts:['6P20 AK-74N枪托','AK-74 Magpul制动器','Zenit RK-3握把','6P20前护木','Leupold Mark 6瞄准镜'],tips:'性价比最高的低预算配置，适合新手入门'},
  {name:'SKS半自动',price:'～22,000₽',icon:'🎯',budget:'low',type:'pve',recoil:62,ergo:48,weight:'3.2',ammo:'BP',parts:['SKS Choate折叠枪托','SKS DTK补偿器','SKS标准弹匣×3'],tips:'超低预算首选，PVE表现稳定'},
  {name:'MP5冲锋枪',price:'～65,000₽',icon:'🔫',budget:'mid',type:'pvp',recoil:38,ergo:74,weight:'2.8',ammo:'PBP',parts:['MP5 B&T消声器','MP5 Magpul折叠托','MP5 垂直握把','Burris FastFire全息'],tips:'近距离PVP神器，人机极佳'},
  {name:'SA-58自动步枪',price:'～120,000₽',icon:'🎯',budget:'mid',type:'pve',recoil:42,ergo:55,weight:'4.0',ammo:'M61',parts:['SA-58 PARA枪托','SA-58 DTK制动器','SA-58 20发弹匣','SA-58 Magpul握把'],tips:'中端PVE首选，7.62x51穿透强'},
  {name:'M4A1改装版',price:'～180,000₽',icon:'🔫',budget:'high',type:'pvp',recoil:32,ergo:68,weight:'4.2',ammo:'M995',parts:['M4A1 Geissele枪托','SLR ION超轻导轨','Ops Core消声器','Trijicon ACOG 4x','AFG握把','M4 PMAg 30发弹匣'],tips:'当前版本PVP性价比之王'},
  {name:'RSASS精确步枪',price:'～220,000₽',icon:'🎯',budget:'high',type:'pvp',recoil:28,ergo:72,weight:'5.1',ammo:'M61',parts:['RSASS 18寸枪管','RSASS消声器','Leupold Mark 6 3-18x','RSASS钨合金制动'],tips:'远程精度极高，适合打狙'},
];
let allLoadouts=[],budgetFilter='',selectedId=-1;

function getLS(k){try{const d=localStorage.getItem('tarkov_'+k);return d?JSON.parse(d):null;}catch{return null;}}
async function loadData(){
  let data=getLS('loadouts');
  if(!data||!data.length){
    try{const r=await fetch('data/loadouts.json?t='+Date.now());if(r.ok){const j=await r.json();data=j.loadouts||j||[];}}catch(e){}
  }
  allLoadouts=(data&&data.length?data:DEF).map((l,i)=>({...DEF[i],...l}));
  render();
}

function render(){
  let data=[...allLoadouts];
  if(budgetFilter==='pvp') data=data.filter(l=>l.type==='pvp');
  else if(budgetFilter==='pve') data=data.filter(l=>l.type==='pve');
  else if(budgetFilter) data=data.filter(l=>l.budget===budgetFilter);
  if(!data.length){document.getElementById('loadoutsGrid').innerHTML='<div class="empty">暂无该分类配装方案</div>';return;}
  const typeL={pvp:'🔴 PVP',pve:'🟢 PVE',all:'🔵 全能'};
  document.getElementById('loadoutsGrid').innerHTML=data.map((l,i)=>`
  <div class="lc ${selectedId===i?'selected':''}" onclick="showDetail(${i})">
    <div class="lc-header"><span class="lc-name">${l.icon||'🔫'} ${l.name}</span><span class="lc-price">${l.price}</span></div>
    <div class="lc-img">${l.icon||'🔫'}</div>
    <div class="lc-stats">
      <div class="ls"><span class="ls-v">${l.recoil}</span><span class="ls-l">后坐力</span></div>
      <div class="ls"><span class="ls-v">${l.ergo}</span><span class="ls-l">人机</span></div>
      <div class="ls"><span class="ls-v">${l.weight}kg</span><span class="ls-l">重量</span></div>
    </div>
    <div class="lc-body">
      <div class="lc-tags">
        <span class="lt lt-rec">推荐</span>
        <span class="lt lt-pvp">${typeL[l.type]||l.type}</span>
        ${l.budget==='low'?'<span class="lt lt-bgt">低预算</span>':l.budget==='mid'?'<span class="lt lt-bgt">中等预算</span>':l.budget==='high'?'<span class="lt lt-bgt">高端配置</span>':''}
      </div>
      ${l.ammo?`<div class="lc-ammo">💊 推荐弹药：<b style="color:var(--text1)">${l.ammo}</b></div>`:''}
      ${l.tips?`<div style="font-size:11px;color:var(--text3);margin-top:6px">${l.tips}</div>`:''}
    </div>
  </div>`).join('');
}

function showDetail(i){
  const data=allLoadouts.filter(l=>budgetFilter==='pvp'?l.type==='pvp':budgetFilter==='pve'?l.type==='pve':budgetFilter?l.budget===budgetFilter:true);
  const l=data[i];
  if(!l) return;
  selectedId=i;
  document.getElementById('dmTitle').textContent=l.icon+' '+l.name;
  const parts=l.parts||[];
  document.getElementById('dmBody').innerHTML=`
    <div class="dm-stats">
      <div class="dm-stat"><span class="dm-stat-v">${l.recoil}</span><span class="dm-stat-l">后坐力</span></div>
      <div class="dm-stat"><span class="dm-stat-v">${l.ergo}</span><span class="dm-stat-l">人机精度</span></div>
      <div class="dm-stat"><span class="dm-stat-v">${l.weight}kg</span><span class="dm-stat-l">总重量</span></div>
    </div>
    <div class="dm-section">
      <div class="dm-sec-title">💰 预算参考</div>
      <div style="font-size:16px;font-weight:700;color:var(--gold);font-family:var(--mono)">${l.price}</div>
    </div>
    ${l.ammo?`<div class="dm-section"><div class="dm-sec-title">💊 推荐弹药</div><div style="font-size:14px;font-weight:600;color:var(--text1)">${l.ammo}</div></div>`:''}
    ${parts.length?`<div class="dm-section"><div class="dm-sec-title">🔧 配件清单</div><ul class="dm-parts">${parts.map(p=>`<li>${p}</li>`).join('')}</ul></div>`:''}
    ${l.tips?`<div class="dm-section"><div class="dm-sec-title">💡 使用建议</div><div style="font-size:13px;color:var(--text2);line-height:1.7">${l.tips}</div></div>`:''}`;
  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail(e){
  if(!e||e.target===document.getElementById('detailOverlay')) document.getElementById('detailOverlay').classList.remove('show');
}

function switchBudget(btn,b){
  budgetFilter=b;
  document.querySelectorAll('.f-tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  render();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape') closeDetail();});
/* ── 搜索/菜单 ── */
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open')}
function openSearch(){document.getElementById('searchOv').classList.add('on');setTimeout(()=>document.getElementById('smInput')?.focus(),100)}
function closeSearch(){document.getElementById('searchOv').classList.remove('on');document.getElementById('searchResults').style.display='none'}
function closeSearchOv(e){if(e.target===document.getElementById('searchOv'))closeSearch()}
const searchData=[];
async function initSearch(){
  try{const r=await fetch('data/articles.json?t='+Date.now());if(r.ok){const j=await r.json();const arts=j.articles||j||[];arts.forEach(a=>{if(a.title){searchData.push({title:a.title,icon:a.icon||'📄',url:'article.html?id='+(a.id||encodeURIComponent(a.title)),cat:a.categoryName||a.categoryLabel||'攻略',type:'article'})}})}}
  catch(e){}
}
function doSearch(kw){
  kw=kw.trim().toLowerCase();
  const el=document.getElementById('searchResults');
  if(!kw){el.style.display='none';return}
  const results=searchData.filter(s=>s.title.toLowerCase().includes(kw)).slice(0,8);
  if(!results.length){el.style.display='block';el.innerHTML='<div class="sr-empty">未找到相关内容</div>';return}
  el.style.display='block';
  el.innerHTML=results.map(r=>`<a href="${r.url}" class="sr-item"><span class="sr-icon">${r.icon}</span><div class="sr-body"><div class="sr-title">${r.title}</div><span class="sr-cat">${r.cat}</span></div></a>`).join('');
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch()}if(e.key==='Escape')closeSearch()});
initSearch();
loadData();
</script>
</body>
